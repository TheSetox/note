name: quality-ios

on:
  pull_request:
    branches:
      - main
    paths:
      - "iosApp/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-ios.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "iosApp/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-ios.yml"
  workflow_dispatch:

concurrency:
  group: quality-ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g

jobs:
  module-quality:
    name: Quality Gate - iOS Module
    runs-on: macos-15
    timeout-minutes: 45
    outputs:
      build: ${{ steps.collect.outputs.build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build iOS simulator app
        id: build
        continue-on-error: true
        run: ./gradlew :iosApp:buildIosSimulatorApp

      - name: Collect outputs
        id: collect
        if: always()
        env:
          BUILD_RESULT: ${{ steps.build.outcome }}
        run: |
          echo "build=${BUILD_RESULT}" >> "$GITHUB_OUTPUT"

      - name: Publish summary
        if: always()
        env:
          BUILD_RESULT: ${{ steps.collect.outputs.build }}
        run: |
          status_icon() {
            case "$1" in
              success) echo "✅ success" ;;
              failure) echo "❌ failure" ;;
              cancelled) echo "⚪ cancelled" ;;
              skipped) echo "⚪ skipped" ;;
              *) echo "⚪ unknown" ;;
            esac
          }

          echo "### iOS Module Quality Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`:iosApp:buildIosSimulatorApp\` | $(status_icon "$BUILD_RESULT") |" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce gate
        if: always()
        env:
          BUILD_RESULT: ${{ steps.collect.outputs.build }}
        run: |
          if [ "$BUILD_RESULT" != "success" ]; then
            echo "iOS quality gate failed."
            exit 1
          fi

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-quality-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore

  report-pr:
    name: Quality Gate - iOS PR Comment
    runs-on: ubuntu-latest
    needs:
      - module-quality
    if: ${{ github.event_name == 'pull_request' && always() }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Post iOS quality comment
        uses: actions/github-script@v7
        env:
          WORKFLOW_RESULT: ${{ needs.module-quality.result }}
          BUILD_RESULT: ${{ needs.module-quality.outputs.build }}
        with:
          script: |
            const marker = '<!-- quality-gate-ios -->'
            const toBadge = (value) => {
              switch (value) {
                case 'success':
                  return '✅ success'
                case 'failure':
                  return '❌ failure'
                case 'cancelled':
                  return '⚪ cancelled'
                case 'skipped':
                  return '⚪ skipped'
                default:
                  return '⚪ unknown'
              }
            }

            const body = `${marker}
            ### Quality Gate Report - iOS Module

            | Check | Result |
            |---|---|
            | Workflow overall | ${toBadge(process.env.WORKFLOW_RESULT)} |
            | \`:iosApp:buildIosSimulatorApp\` | ${toBadge(process.env.BUILD_RESULT)} |
            `

            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            })
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              })
            }
