name: quality-ios

on:
  pull_request:
    branches:
      - main
    paths:
      - "iosApp/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-ios.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "iosApp/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-ios.yml"
  workflow_dispatch:

concurrency:
  group: quality-ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    uses: ./.github/workflows/quality-module-reusable.yml
    with:
      module_key: ios
      module_title: iOS Module
      runner: macos-15
      assemble_cmd: ":iosApp:buildIosSimulatorApp"
      assemble_label: ":iosApp:buildIosSimulatorApp"
    secrets: inherit
