name: quality-desktop

on:
  pull_request:
    branches:
      - main
    paths:
      - "desktopApp/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-desktop.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "desktopApp/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-desktop.yml"
  workflow_dispatch:

concurrency:
  group: quality-desktop-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    uses: ./.github/workflows/quality-module-reusable.yml
    with:
      module_key: desktop
      module_title: Desktop Module
      runner: ubuntu-latest
      lint_cmd: "spotlessCheck"
      lint_label: "spotlessCheck"
      detekt_cmd: ":desktopApp:detekt"
      detekt_label: ":desktopApp:detekt"
      test_cmd: ":desktopApp:test"
      test_label: ":desktopApp:test"
      assemble_cmd: ":desktopApp:assemble"
      assemble_label: ":desktopApp:assemble"
      kover_cmd: ":desktopApp:koverHtmlReport"
      kover_label: ":desktopApp:koverHtmlReport"
      kover_html_report_dir: desktopApp/build/reports/kover/html
      coverage_module: desktopApp
      coverage_title: Desktop Line Coverage
    secrets: inherit
