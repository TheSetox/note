name: quality-module-reusable

on:
  workflow_call:
    inputs:
      module_key:
        description: Unique key for the module section in PR comment
        required: true
        type: string
      module_title:
        description: Module title shown in summaries and PR comment
        required: true
        type: string
      runner:
        description: GitHub runner label
        required: false
        type: string
        default: ubuntu-latest
      lint_cmd:
        description: Gradle command argument for lint check
        required: false
        type: string
        default: ""
      lint_label:
        description: Label shown for lint check
        required: false
        type: string
        default: ""
      test_cmd:
        description: Gradle command argument for test check
        required: false
        type: string
        default: ""
      test_label:
        description: Label shown for test check
        required: false
        type: string
        default: ""
      assemble_cmd:
        description: Gradle command argument for assemble/build check
        required: false
        type: string
        default: ""
      assemble_label:
        description: Label shown for assemble/build check
        required: false
        type: string
        default: ""
      kover_cmd:
        description: Gradle command argument for Kover XML check
        required: false
        type: string
        default: ""
      kover_label:
        description: Label shown for Kover check
        required: false
        type: string
        default: ""
      kover_report_path:
        description: XML report path used to build coverage table
        required: false
        type: string
        default: ""
      coverage_module:
        description: Module name shown in coverage table
        required: false
        type: string
        default: ""
      coverage_title:
        description: Coverage section title
        required: false
        type: string
        default: ""

env:
  CI: true
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g

jobs:
  module-quality:
    name: Quality Gate - ${{ inputs.module_title }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      lint: ${{ steps.collect.outputs.lint }}
      test: ${{ steps.collect.outputs.test }}
      assemble: ${{ steps.collect.outputs.assemble }}
      kover: ${{ steps.collect.outputs.kover }}
      kover_table: ${{ steps.collect.outputs.kover_table }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run lint check
        id: lint
        if: ${{ inputs.lint_cmd != '' }}
        continue-on-error: true
        run: ./gradlew ${{ inputs.lint_cmd }}

      - name: Run test check
        id: test
        if: ${{ inputs.test_cmd != '' }}
        continue-on-error: true
        run: ./gradlew ${{ inputs.test_cmd }}

      - name: Run assemble/build check
        id: assemble
        if: ${{ inputs.assemble_cmd != '' }}
        continue-on-error: true
        run: ./gradlew ${{ inputs.assemble_cmd }}

      - name: Run coverage check
        id: kover
        if: ${{ inputs.kover_cmd != '' }}
        continue-on-error: true
        run: ./gradlew ${{ inputs.kover_cmd }}

      - name: Collect outputs
        id: collect
        if: always()
        env:
          MODULE_KEY: ${{ inputs.module_key }}
          MODULE_TITLE: ${{ inputs.module_title }}
          LINT_CMD: ${{ inputs.lint_cmd }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TEST_CMD: ${{ inputs.test_cmd }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          ASSEMBLE_CMD: ${{ inputs.assemble_cmd }}
          ASSEMBLE_OUTCOME: ${{ steps.assemble.outcome }}
          KOVER_CMD: ${{ inputs.kover_cmd }}
          KOVER_OUTCOME: ${{ steps.kover.outcome }}
          KOVER_REPORT_PATH: ${{ inputs.kover_report_path }}
          COVERAGE_MODULE: ${{ inputs.coverage_module }}
        run: |
          lint_result="${LINT_OUTCOME:-skipped}"
          test_result="${TEST_OUTCOME:-skipped}"
          assemble_result="${ASSEMBLE_OUTCOME:-skipped}"
          kover_result="${KOVER_OUTCOME:-skipped}"

          [ -z "$LINT_CMD" ] && lint_result="skipped"
          [ -z "$TEST_CMD" ] && test_result="skipped"
          [ -z "$ASSEMBLE_CMD" ] && assemble_result="skipped"
          [ -z "$KOVER_CMD" ] && kover_result="skipped"

          table_file="$RUNNER_TEMP/kover_table.md"
          : > "$table_file"

          if [ -n "$KOVER_CMD" ]; then
            module_name="$COVERAGE_MODULE"
            [ -z "$module_name" ] && module_name="$MODULE_KEY"

            echo "| Module | Missed | Covered | Total | Line % |" > "$table_file"
            echo "|---|---:|---:|---:|---:|" >> "$table_file"

            if [ -n "$KOVER_REPORT_PATH" ] && [ -f "$KOVER_REPORT_PATH" ]; then
              line=$(grep 'counter type=\"LINE\"' "$KOVER_REPORT_PATH" | tail -n 1 || true)
              missed=$(echo "$line" | sed -n 's/.*missed=\"\([0-9]\+\)\".*/\1/p')
              covered=$(echo "$line" | sed -n 's/.*covered=\"\([0-9]\+\)\".*/\1/p')
              missed=${missed:-0}
              covered=${covered:-0}
              total=$((missed + covered))
              if [ "$total" -eq 0 ]; then
                pct="n/a"
              else
                pct=$(awk -v c="$covered" -v t="$total" 'BEGIN { printf "%.2f%%", (100*c)/t }')
              fi
              echo "| \`$module_name\` | $missed | $covered | $total | $pct |" >> "$table_file"
            else
              echo "| \`$module_name\` | 0 | 0 | 0 | n/a |" >> "$table_file"
            fi
          fi

          echo "lint=${lint_result}" >> "$GITHUB_OUTPUT"
          echo "test=${test_result}" >> "$GITHUB_OUTPUT"
          echo "assemble=${assemble_result}" >> "$GITHUB_OUTPUT"
          echo "kover=${kover_result}" >> "$GITHUB_OUTPUT"
          echo "kover_table<<EOF" >> "$GITHUB_OUTPUT"
          cat "$table_file" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish summary
        if: always()
        env:
          MODULE_TITLE: ${{ inputs.module_title }}
          COVERAGE_TITLE: ${{ inputs.coverage_title }}
          LINT_CMD: ${{ inputs.lint_cmd }}
          LINT_LABEL: ${{ inputs.lint_label }}
          LINT_RESULT: ${{ steps.collect.outputs.lint }}
          TEST_CMD: ${{ inputs.test_cmd }}
          TEST_LABEL: ${{ inputs.test_label }}
          TEST_RESULT: ${{ steps.collect.outputs.test }}
          ASSEMBLE_CMD: ${{ inputs.assemble_cmd }}
          ASSEMBLE_LABEL: ${{ inputs.assemble_label }}
          ASSEMBLE_RESULT: ${{ steps.collect.outputs.assemble }}
          KOVER_CMD: ${{ inputs.kover_cmd }}
          KOVER_LABEL: ${{ inputs.kover_label }}
          KOVER_RESULT: ${{ steps.collect.outputs.kover }}
          KOVER_TABLE: ${{ steps.collect.outputs.kover_table }}
        run: |
          status_icon() {
            case "$1" in
              success) echo "✅ success" ;;
              failure) echo "❌ failure" ;;
              cancelled) echo "⚪ cancelled" ;;
              skipped) echo "⚪ skipped" ;;
              *) echo "⚪ unknown" ;;
            esac
          }

          add_row() {
            local cmd="$1"
            local label="$2"
            local result="$3"
            if [ -z "$cmd" ]; then
              return
            fi
            if [ -z "$label" ]; then
              label="$cmd"
            fi
            echo "| \`$label\` | $(status_icon "$result") |" >> "$GITHUB_STEP_SUMMARY"
          }

          echo "### ${MODULE_TITLE} Quality Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"

          add_row "$LINT_CMD" "$LINT_LABEL" "$LINT_RESULT"
          add_row "$TEST_CMD" "$TEST_LABEL" "$TEST_RESULT"
          add_row "$ASSEMBLE_CMD" "$ASSEMBLE_LABEL" "$ASSEMBLE_RESULT"
          add_row "$KOVER_CMD" "$KOVER_LABEL" "$KOVER_RESULT"

          if [ -n "$KOVER_CMD" ] && [ -n "$KOVER_TABLE" ]; then
            coverage_title="$COVERAGE_TITLE"
            [ -z "$coverage_title" ] && coverage_title="${MODULE_TITLE} Line Coverage"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ${coverage_title}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "$KOVER_TABLE" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enforce gate
        if: always()
        env:
          LINT_CMD: ${{ inputs.lint_cmd }}
          LINT_RESULT: ${{ steps.collect.outputs.lint }}
          TEST_CMD: ${{ inputs.test_cmd }}
          TEST_RESULT: ${{ steps.collect.outputs.test }}
          ASSEMBLE_CMD: ${{ inputs.assemble_cmd }}
          ASSEMBLE_RESULT: ${{ steps.collect.outputs.assemble }}
          KOVER_CMD: ${{ inputs.kover_cmd }}
          KOVER_RESULT: ${{ steps.collect.outputs.kover }}
        run: |
          failed=0

          check_result() {
            local cmd="$1"
            local result="$2"
            if [ -z "$cmd" ]; then
              return
            fi
            if [ "$result" != "success" ]; then
              failed=1
            fi
          }

          check_result "$LINT_CMD" "$LINT_RESULT"
          check_result "$TEST_CMD" "$TEST_RESULT"
          check_result "$ASSEMBLE_CMD" "$ASSEMBLE_RESULT"
          check_result "$KOVER_CMD" "$KOVER_RESULT"

          if [ "$failed" -ne 0 ]; then
            echo "One or more quality checks failed for module workflow."
            exit 1
          fi

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.module_key }}-quality-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore

  report-pr:
    name: Quality Gate - ${{ inputs.module_title }} PR Comment
    runs-on: ubuntu-latest
    needs:
      - module-quality
    if: ${{ github.event_name == 'pull_request' && always() }}
    concurrency:
      group: quality-gate-pr-comment-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upsert shared quality comment section
        uses: actions/github-script@v7
        env:
          MODULE_KEY: ${{ inputs.module_key }}
          MODULE_TITLE: ${{ inputs.module_title }}
          COVERAGE_TITLE: ${{ inputs.coverage_title }}
          LINT_CMD: ${{ inputs.lint_cmd }}
          LINT_LABEL: ${{ inputs.lint_label }}
          LINT_RESULT: ${{ needs.module-quality.outputs.lint }}
          TEST_CMD: ${{ inputs.test_cmd }}
          TEST_LABEL: ${{ inputs.test_label }}
          TEST_RESULT: ${{ needs.module-quality.outputs.test }}
          ASSEMBLE_CMD: ${{ inputs.assemble_cmd }}
          ASSEMBLE_LABEL: ${{ inputs.assemble_label }}
          ASSEMBLE_RESULT: ${{ needs.module-quality.outputs.assemble }}
          KOVER_CMD: ${{ inputs.kover_cmd }}
          KOVER_LABEL: ${{ inputs.kover_label }}
          KOVER_RESULT: ${{ needs.module-quality.outputs.kover }}
          KOVER_TABLE: ${{ needs.module-quality.outputs.kover_table }}
          WORKFLOW_RESULT: ${{ needs.module-quality.result }}
        with:
          script: |
            const { upsertQualityComment } = require('./.github/scripts/upsert-quality-comment.cjs')
            await upsertQualityComment({ github, context, env: process.env })
