name: quality-module-reusable

on:
  workflow_call:
    inputs:
      module_key:
        description: Unique key for the module section in PR comment
        required: true
        type: string
      module_title:
        description: Module title shown in summaries and PR comment
        required: true
        type: string
      runner:
        description: GitHub runner label
        required: false
        type: string
        default: ubuntu-latest
      lint_cmd:
        description: Gradle command argument for lint check
        required: false
        type: string
        default: ""
      lint_label:
        description: Label shown for lint check
        required: false
        type: string
        default: ""
      detekt_cmd:
        description: Gradle command argument for Detekt check
        required: false
        type: string
        default: ""
      detekt_label:
        description: Label shown for Detekt check
        required: false
        type: string
        default: ""
      test_cmd:
        description: Gradle command argument for test check
        required: false
        type: string
        default: ""
      test_label:
        description: Label shown for test check
        required: false
        type: string
        default: ""
      assemble_cmd:
        description: Gradle command argument for assemble/build check
        required: false
        type: string
        default: ""
      assemble_label:
        description: Label shown for assemble/build check
        required: false
        type: string
        default: ""
      kover_cmd:
        description: Gradle command argument for Kover XML check
        required: false
        type: string
        default: ""
      kover_label:
        description: Label shown for Kover check
        required: false
        type: string
        default: ""
      kover_html_report_dir:
        description: HTML report directory used to build coverage table and artifact zip
        required: false
        type: string
        default: ""
      coverage_module:
        description: Module name shown in coverage table
        required: false
        type: string
        default: ""
      coverage_title:
        description: Coverage section title
        required: false
        type: string
        default: ""

env:
  CI: true
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g

jobs:
  module-quality:
    name: Quality Gate - ${{ inputs.module_title }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      lint: ${{ steps.collect.outputs.lint }}
      detekt: ${{ steps.collect.outputs.detekt }}
      test: ${{ steps.collect.outputs.test }}
      assemble: ${{ steps.collect.outputs.assemble }}
      kover: ${{ steps.collect.outputs.kover }}
      kover_table: ${{ steps.collect.outputs.kover_table }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run lint check
        id: lint
        if: ${{ inputs.lint_cmd != '' }}
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./gradlew ${{ inputs.lint_cmd }} 2>&1 | tee "$RUNNER_TEMP/${{ inputs.module_key }}-spotless.log"

      - name: Run Detekt check
        id: detekt
        if: ${{ inputs.detekt_cmd != '' }}
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./gradlew ${{ inputs.detekt_cmd }} 2>&1 | tee "$RUNNER_TEMP/${{ inputs.module_key }}-detekt.log"

      - name: Run test check
        id: test
        if: ${{ inputs.test_cmd != '' }}
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./gradlew ${{ inputs.test_cmd }} 2>&1 | tee "$RUNNER_TEMP/${{ inputs.module_key }}-test.log"

      - name: Run assemble/build check
        id: assemble
        if: ${{ inputs.assemble_cmd != '' }}
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./gradlew ${{ inputs.assemble_cmd }} 2>&1 | tee "$RUNNER_TEMP/${{ inputs.module_key }}-assemble.log"

      - name: Run coverage check
        id: kover
        if: ${{ inputs.kover_cmd != '' }}
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./gradlew ${{ inputs.kover_cmd }} 2>&1 | tee "$RUNNER_TEMP/${{ inputs.module_key }}-kover.log"

      - name: Collect outputs
        id: collect
        if: always()
        env:
          MODULE_KEY: ${{ inputs.module_key }}
          MODULE_TITLE: ${{ inputs.module_title }}
          LINT_CMD: ${{ inputs.lint_cmd }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          DETEKT_CMD: ${{ inputs.detekt_cmd }}
          DETEKT_OUTCOME: ${{ steps.detekt.outcome }}
          TEST_CMD: ${{ inputs.test_cmd }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          ASSEMBLE_CMD: ${{ inputs.assemble_cmd }}
          ASSEMBLE_OUTCOME: ${{ steps.assemble.outcome }}
          KOVER_CMD: ${{ inputs.kover_cmd }}
          KOVER_OUTCOME: ${{ steps.kover.outcome }}
          KOVER_HTML_REPORT_DIR: ${{ inputs.kover_html_report_dir }}
          COVERAGE_MODULE: ${{ inputs.coverage_module }}
        run: |
          lint_result="${LINT_OUTCOME:-skipped}"
          detekt_result="${DETEKT_OUTCOME:-skipped}"
          test_result="${TEST_OUTCOME:-skipped}"
          assemble_result="${ASSEMBLE_OUTCOME:-skipped}"
          kover_result="${KOVER_OUTCOME:-skipped}"

          [ -z "$LINT_CMD" ] && lint_result="skipped"
          [ -z "$DETEKT_CMD" ] && detekt_result="skipped"
          [ -z "$TEST_CMD" ] && test_result="skipped"
          [ -z "$ASSEMBLE_CMD" ] && assemble_result="skipped"
          [ -z "$KOVER_CMD" ] && kover_result="skipped"

          table_file="$RUNNER_TEMP/kover_table.md"
          : > "$table_file"

          if [ -n "$KOVER_CMD" ]; then
            module_name="$COVERAGE_MODULE"
            [ -z "$module_name" ] && module_name="$MODULE_KEY"

            echo "| Module | Missed | Covered | Total | Line % |" > "$table_file"
            echo "|---|---:|---:|---:|---:|" >> "$table_file"

            index_file="$KOVER_HTML_REPORT_DIR/index.html"
            if [ -n "$KOVER_HTML_REPORT_DIR" ] && [ -f "$index_file" ]; then
              line_abs=$(
                awk '
                  /<td class="name">all classes<\/td>/ { inrow = 1; next }
                  inrow && /<span class="absValue">/ {
                    getline
                    gsub(/[[:space:]]/, "", $0)
                    if ($0 ~ /^\([0-9]+\/[0-9]+\)$/) {
                      abs[++count] = $0
                    }
                  }
                  inrow && /<\/tr>/ { exit }
                  END {
                    if (count >= 3) {
                      print abs[3]
                    }
                  }
                ' "$index_file"
              )
              line_pct=$(
                awk '
                  /<td class="name">all classes<\/td>/ { inrow = 1; next }
                  inrow && /<span class="percent">/ {
                    getline
                    gsub(/[[:space:]]/, "", $0)
                    if ($0 ~ /^[0-9]+(\.[0-9]+)?%$/) {
                      pct[++count] = $0
                    }
                  }
                  inrow && /<\/tr>/ { exit }
                  END {
                    if (count >= 3) {
                      print pct[3]
                    }
                  }
                ' "$index_file"
              )
              covered=$(echo "$line_abs" | sed -n 's/^(\([0-9]\+\)\/\([0-9]\+\))$/\1/p')
              total=$(echo "$line_abs" | sed -n 's/^(\([0-9]\+\)\/\([0-9]\+\))$/\2/p')
              covered=${covered:-0}
              total=${total:-0}
              missed=$((total - covered))
              [ "$missed" -lt 0 ] && missed=0
              [ -z "$line_pct" ] && line_pct="n/a"
              echo "| \`$module_name\` | $missed | $covered | $total | $line_pct |" >> "$table_file"
            else
              echo "| \`$module_name\` | 0 | 0 | 0 | n/a |" >> "$table_file"
            fi
          fi

          echo "lint=${lint_result}" >> "$GITHUB_OUTPUT"
          echo "detekt=${detekt_result}" >> "$GITHUB_OUTPUT"
          echo "test=${test_result}" >> "$GITHUB_OUTPUT"
          echo "assemble=${assemble_result}" >> "$GITHUB_OUTPUT"
          echo "kover=${kover_result}" >> "$GITHUB_OUTPUT"
          echo "kover_table<<EOF" >> "$GITHUB_OUTPUT"
          cat "$table_file" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish summary
        if: always()
        env:
          MODULE_TITLE: ${{ inputs.module_title }}
          COVERAGE_TITLE: ${{ inputs.coverage_title }}
          LINT_CMD: ${{ inputs.lint_cmd }}
          LINT_LABEL: ${{ inputs.lint_label }}
          LINT_RESULT: ${{ steps.collect.outputs.lint }}
          DETEKT_CMD: ${{ inputs.detekt_cmd }}
          DETEKT_LABEL: ${{ inputs.detekt_label }}
          DETEKT_RESULT: ${{ steps.collect.outputs.detekt }}
          TEST_CMD: ${{ inputs.test_cmd }}
          TEST_LABEL: ${{ inputs.test_label }}
          TEST_RESULT: ${{ steps.collect.outputs.test }}
          ASSEMBLE_CMD: ${{ inputs.assemble_cmd }}
          ASSEMBLE_LABEL: ${{ inputs.assemble_label }}
          ASSEMBLE_RESULT: ${{ steps.collect.outputs.assemble }}
          KOVER_CMD: ${{ inputs.kover_cmd }}
          KOVER_LABEL: ${{ inputs.kover_label }}
          KOVER_RESULT: ${{ steps.collect.outputs.kover }}
          KOVER_TABLE: ${{ steps.collect.outputs.kover_table }}
        run: |
          status_icon() {
            case "$1" in
              success) echo "✅ success" ;;
              failure) echo "❌ failure" ;;
              cancelled) echo "⚪ cancelled" ;;
              skipped) echo "⚪ skipped" ;;
              *) echo "⚪ unknown" ;;
            esac
          }

          add_row() {
            local cmd="$1"
            local label="$2"
            local result="$3"
            if [ -z "$cmd" ]; then
              return
            fi
            if [ -z "$label" ]; then
              label="$cmd"
            fi
            echo "| \`$label\` | $(status_icon "$result") |" >> "$GITHUB_STEP_SUMMARY"
          }

          echo "### ${MODULE_TITLE} Quality Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"

          add_row "$LINT_CMD" "$LINT_LABEL" "$LINT_RESULT"
          add_row "$DETEKT_CMD" "$DETEKT_LABEL" "$DETEKT_RESULT"
          add_row "$TEST_CMD" "$TEST_LABEL" "$TEST_RESULT"
          add_row "$ASSEMBLE_CMD" "$ASSEMBLE_LABEL" "$ASSEMBLE_RESULT"
          add_row "$KOVER_CMD" "$KOVER_LABEL" "$KOVER_RESULT"

          if [ -n "$KOVER_CMD" ] && [ -n "$KOVER_TABLE" ]; then
            coverage_title="$COVERAGE_TITLE"
            [ -z "$coverage_title" ] && coverage_title="${MODULE_TITLE} Line Coverage"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ${coverage_title}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "$KOVER_TABLE" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enforce gate
        if: always()
        env:
          LINT_CMD: ${{ inputs.lint_cmd }}
          LINT_RESULT: ${{ steps.collect.outputs.lint }}
          DETEKT_CMD: ${{ inputs.detekt_cmd }}
          DETEKT_RESULT: ${{ steps.collect.outputs.detekt }}
          TEST_CMD: ${{ inputs.test_cmd }}
          TEST_RESULT: ${{ steps.collect.outputs.test }}
          ASSEMBLE_CMD: ${{ inputs.assemble_cmd }}
          ASSEMBLE_RESULT: ${{ steps.collect.outputs.assemble }}
          KOVER_CMD: ${{ inputs.kover_cmd }}
          KOVER_RESULT: ${{ steps.collect.outputs.kover }}
        run: |
          failed=0

          check_result() {
            local cmd="$1"
            local result="$2"
            if [ -z "$cmd" ]; then
              return
            fi
            if [ "$result" != "success" ]; then
              failed=1
            fi
          }

          check_result "$LINT_CMD" "$LINT_RESULT"
          check_result "$DETEKT_CMD" "$DETEKT_RESULT"
          check_result "$TEST_CMD" "$TEST_RESULT"
          check_result "$ASSEMBLE_CMD" "$ASSEMBLE_RESULT"
          check_result "$KOVER_CMD" "$KOVER_RESULT"

          if [ "$failed" -ne 0 ]; then
            echo "One or more quality checks failed for module workflow."
            exit 1
          fi

      - name: Upload Spotless outputs
        if: always() && inputs.lint_cmd != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.module_key }}-spotless
          path: |
            ${{ runner.temp }}/${{ inputs.module_key }}-spotless.log
            **/build/reports/spotless/**
          if-no-files-found: ignore

      - name: Upload Detekt outputs
        if: always() && inputs.detekt_cmd != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.module_key }}-detekt
          path: |
            ${{ runner.temp }}/${{ inputs.module_key }}-detekt.log
            **/build/reports/detekt/**
          if-no-files-found: ignore

      - name: Upload test outputs
        if: always() && inputs.test_cmd != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.module_key }}-test
          path: |
            ${{ runner.temp }}/${{ inputs.module_key }}-test.log
            **/build/test-results/**
            **/build/reports/tests/**
          if-no-files-found: ignore

      - name: Archive Kover HTML report
        id: kover_archive
        if: always() && inputs.kover_cmd != '' && inputs.kover_html_report_dir != ''
        shell: bash
        run: |
          report_dir="${{ inputs.kover_html_report_dir }}"
          archive_path="$RUNNER_TEMP/${{ inputs.module_key }}-kover-html.zip"

          if [ -d "$report_dir" ]; then
            parent_dir=$(dirname "$report_dir")
            report_name=$(basename "$report_dir")
            (
              cd "$parent_dir"
              zip -rq "$archive_path" "$report_name"
            )
            echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"
          else
            echo "archive_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Kover outputs
        if: always() && inputs.kover_cmd != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.module_key }}-kover
          path: |
            ${{ runner.temp }}/${{ inputs.module_key }}-kover.log
            ${{ steps.kover_archive.outputs.archive_path }}
            ${{ inputs.kover_html_report_dir }}
            **/build/reports/kover/**
          if-no-files-found: ignore

      - name: Upload quality bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.module_key }}-quality-reports
          path: |
            ${{ runner.temp }}/${{ inputs.module_key }}-assemble.log
            ${{ runner.temp }}/${{ inputs.module_key }}-detekt.log
            ${{ steps.kover_archive.outputs.archive_path }}
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore

  report-pr:
    name: Quality Gate - ${{ inputs.module_title }} PR Comment
    runs-on: ubuntu-latest
    needs:
      - module-quality
    if: ${{ github.event_name == 'pull_request' && always() }}
    concurrency:
      group: quality-gate-pr-comment-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upsert shared quality comment section
        uses: actions/github-script@v7
        env:
          MODULE_KEY: ${{ inputs.module_key }}
          MODULE_TITLE: ${{ inputs.module_title }}
          COVERAGE_TITLE: ${{ inputs.coverage_title }}
          LINT_CMD: ${{ inputs.lint_cmd }}
          LINT_LABEL: ${{ inputs.lint_label }}
          LINT_RESULT: ${{ needs.module-quality.outputs.lint }}
          DETEKT_CMD: ${{ inputs.detekt_cmd }}
          DETEKT_LABEL: ${{ inputs.detekt_label }}
          DETEKT_RESULT: ${{ needs.module-quality.outputs.detekt }}
          TEST_CMD: ${{ inputs.test_cmd }}
          TEST_LABEL: ${{ inputs.test_label }}
          TEST_RESULT: ${{ needs.module-quality.outputs.test }}
          ASSEMBLE_CMD: ${{ inputs.assemble_cmd }}
          ASSEMBLE_LABEL: ${{ inputs.assemble_label }}
          ASSEMBLE_RESULT: ${{ needs.module-quality.outputs.assemble }}
          KOVER_CMD: ${{ inputs.kover_cmd }}
          KOVER_LABEL: ${{ inputs.kover_label }}
          KOVER_RESULT: ${{ needs.module-quality.outputs.kover }}
          KOVER_TABLE: ${{ needs.module-quality.outputs.kover_table }}
          WORKFLOW_RESULT: ${{ needs.module-quality.result }}
        with:
          script: |
            const { upsertQualityComment } = require('./.github/scripts/upsert-quality-comment.cjs')
            await upsertQualityComment({ github, context, env: process.env })
