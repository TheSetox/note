name: quality-core-common

on:
  pull_request:
    branches:
      - main
    paths:
      - "core/common/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-core-common.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "core/common/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-core-common.yml"
  workflow_dispatch:

concurrency:
  group: quality-core-common-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    uses: ./.github/workflows/quality-module-reusable.yml
    with:
      module_key: core-common
      module_title: core:common Module
      runner: ubuntu-latest
      lint_cmd: ":core:common:lintDebug"
      lint_label: ":core:common:lintDebug"
      test_cmd: ":core:common:allTests"
      test_label: ":core:common:allTests"
      assemble_cmd: ":core:common:assemble"
      assemble_label: ":core:common:assemble"
      kover_cmd: ":core:common:koverXmlReport"
      kover_label: ":core:common:koverXmlReport"
      kover_report_path: core/common/build/reports/kover/report.xml
      coverage_module: core:common
      coverage_title: core:common Line Coverage
    secrets: inherit
