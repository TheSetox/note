name: pr-summary

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  update:
    name: PR Summary
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.base.ref == 'main' }}
    concurrency:
      group: pr-summary-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upsert PR summary in body
        uses: actions/github-script@v7
        with:
          script: |
            const { upsertPrSummary } = require('./.github/scripts/upsert-pr-summary.cjs')
            await upsertPrSummary({ github, context })
