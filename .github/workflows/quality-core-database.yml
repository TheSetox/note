name: quality-core-database

on:
  pull_request:
    branches:
      - main
    paths:
      - "core/database/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-core-database.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "core/database/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-core-database.yml"
  workflow_dispatch:

concurrency:
  group: quality-core-database-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g

jobs:
  module-quality:
    name: Quality Gate - core:database Module
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      lint: ${{ steps.collect.outputs.lint }}
      test: ${{ steps.collect.outputs.test }}
      assemble: ${{ steps.collect.outputs.assemble }}
      kover: ${{ steps.collect.outputs.kover }}
      kover_table: ${{ steps.collect.outputs.kover_table }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run core:database lint
        id: lint
        continue-on-error: true
        run: ./gradlew :core:database:lintDebug

      - name: Run core:database tests
        id: test
        continue-on-error: true
        run: ./gradlew :core:database:allTests

      - name: Assemble core:database
        id: assemble
        continue-on-error: true
        run: ./gradlew :core:database:assemble

      - name: Generate core:database Kover XML
        id: kover
        continue-on-error: true
        run: ./gradlew :core:database:koverXmlReport

      - name: Collect outputs
        id: collect
        if: always()
        env:
          LINT_RESULT: ${{ steps.lint.outcome }}
          TEST_RESULT: ${{ steps.test.outcome }}
          ASSEMBLE_RESULT: ${{ steps.assemble.outcome }}
          KOVER_RESULT: ${{ steps.kover.outcome }}
        run: |
          table_file="$RUNNER_TEMP/kover_table.md"
          echo "| Module | Missed | Covered | Total | Line % |" > "$table_file"
          echo "|---|---:|---:|---:|---:|" >> "$table_file"

          report="core/database/build/reports/kover/report.xml"
          if [ -f "$report" ]; then
            line=$(grep 'counter type=\"LINE\"' "$report" | tail -n 1 || true)
            missed=$(echo "$line" | sed -n 's/.*missed=\"\([0-9]\+\)\".*/\1/p')
            covered=$(echo "$line" | sed -n 's/.*covered=\"\([0-9]\+\)\".*/\1/p')
            missed=${missed:-0}
            covered=${covered:-0}
            total=$((missed + covered))
            if [ "$total" -eq 0 ]; then
              pct="n/a"
            else
              pct=$(awk -v c="$covered" -v t="$total" 'BEGIN { printf "%.2f%%", (100*c)/t }')
            fi
            echo "| \`core:database\` | $missed | $covered | $total | $pct |" >> "$table_file"
          else
            echo "| \`core:database\` | 0 | 0 | 0 | n/a |" >> "$table_file"
          fi

          echo "lint=${LINT_RESULT}" >> "$GITHUB_OUTPUT"
          echo "test=${TEST_RESULT}" >> "$GITHUB_OUTPUT"
          echo "assemble=${ASSEMBLE_RESULT}" >> "$GITHUB_OUTPUT"
          echo "kover=${KOVER_RESULT}" >> "$GITHUB_OUTPUT"
          echo "kover_table<<EOF" >> "$GITHUB_OUTPUT"
          cat "$table_file" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish summary
        if: always()
        env:
          LINT_RESULT: ${{ steps.collect.outputs.lint }}
          TEST_RESULT: ${{ steps.collect.outputs.test }}
          ASSEMBLE_RESULT: ${{ steps.collect.outputs.assemble }}
          KOVER_RESULT: ${{ steps.collect.outputs.kover }}
          KOVER_TABLE: ${{ steps.collect.outputs.kover_table }}
        run: |
          status_icon() {
            case "$1" in
              success) echo "✅ success" ;;
              failure) echo "❌ failure" ;;
              cancelled) echo "⚪ cancelled" ;;
              skipped) echo "⚪ skipped" ;;
              *) echo "⚪ unknown" ;;
            esac
          }

          echo "### core:database Module Quality Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`:core:database:lintDebug\` | $(status_icon "$LINT_RESULT") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`:core:database:allTests\` | $(status_icon "$TEST_RESULT") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`:core:database:assemble\` | $(status_icon "$ASSEMBLE_RESULT") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`:core:database:koverXmlReport\` | $(status_icon "$KOVER_RESULT") |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### core:database Line Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$KOVER_TABLE" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce gate
        if: always()
        env:
          LINT_RESULT: ${{ steps.collect.outputs.lint }}
          TEST_RESULT: ${{ steps.collect.outputs.test }}
          ASSEMBLE_RESULT: ${{ steps.collect.outputs.assemble }}
          KOVER_RESULT: ${{ steps.collect.outputs.kover }}
        run: |
          failed=0
          for result in "$LINT_RESULT" "$TEST_RESULT" "$ASSEMBLE_RESULT" "$KOVER_RESULT"; do
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "core:database quality gate failed."
            exit 1
          fi

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: core-database-quality-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore

  report-pr:
    name: Quality Gate - core:database PR Comment
    runs-on: ubuntu-latest
    needs:
      - module-quality
    if: ${{ github.event_name == 'pull_request' && always() }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Post core:database quality comment
        uses: actions/github-script@v7
        env:
          WORKFLOW_RESULT: ${{ needs.module-quality.result }}
          LINT_RESULT: ${{ needs.module-quality.outputs.lint }}
          TEST_RESULT: ${{ needs.module-quality.outputs.test }}
          ASSEMBLE_RESULT: ${{ needs.module-quality.outputs.assemble }}
          KOVER_RESULT: ${{ needs.module-quality.outputs.kover }}
          KOVER_TABLE: ${{ needs.module-quality.outputs.kover_table }}
        with:
          script: |
            const marker = '<!-- quality-gate-core-database -->'
            const toBadge = (value) => {
              switch (value) {
                case 'success':
                  return '✅ success'
                case 'failure':
                  return '❌ failure'
                case 'cancelled':
                  return '⚪ cancelled'
                case 'skipped':
                  return '⚪ skipped'
                default:
                  return '⚪ unknown'
              }
            }

            const coverageTable = process.env.KOVER_TABLE?.trim()
              || '| Module | Missed | Covered | Total | Line % |\\n|---|---:|---:|---:|---:|\\n| `core:database` | 0 | 0 | 0 | n/a |'

            const body = `${marker}
            ### Quality Gate Report - core:database Module

            | Check | Result |
            |---|---|
            | Workflow overall | ${toBadge(process.env.WORKFLOW_RESULT)} |
            | \`:core:database:lintDebug\` | ${toBadge(process.env.LINT_RESULT)} |
            | \`:core:database:allTests\` | ${toBadge(process.env.TEST_RESULT)} |
            | \`:core:database:assemble\` | ${toBadge(process.env.ASSEMBLE_RESULT)} |
            | \`:core:database:koverXmlReport\` | ${toBadge(process.env.KOVER_RESULT)} |

            ### core:database Line Coverage
            ${coverageTable}
            `

            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            })
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              })
            }

