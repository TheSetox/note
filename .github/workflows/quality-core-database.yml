name: quality-core-database

on:
  pull_request:
    branches:
      - main
    paths:
      - "core/database/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-core-database.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "core/database/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-core-database.yml"
  workflow_dispatch:

concurrency:
  group: quality-core-database-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    uses: ./.github/workflows/quality-module-reusable.yml
    with:
      module_key: core-database
      module_title: core:database Module
      runner: ubuntu-latest
      lint_cmd: "spotlessCheck"
      lint_label: "spotlessCheck"
      detekt_cmd: ":core:database:detekt"
      detekt_label: ":core:database:detekt"
      test_cmd: ":core:database:allTests"
      test_label: ":core:database:allTests"
      assemble_cmd: ":core:database:assemble"
      assemble_label: ":core:database:assemble"
      kover_cmd: ":core:database:koverHtmlReport"
      kover_label: ":core:database:koverHtmlReport"
      kover_html_report_dir: core/database/build/reports/kover/html
      coverage_module: core:database
      coverage_title: core:database Line Coverage
    secrets: inherit
