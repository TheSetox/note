name: quality-feature-notes

on:
  pull_request:
    branches:
      - main
    paths:
      - "feature/notes/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-feature-notes.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "feature/notes/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-feature-notes.yml"
  workflow_dispatch:

concurrency:
  group: quality-feature-notes-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    uses: ./.github/workflows/quality-module-reusable.yml
    with:
      module_key: feature-notes
      module_title: feature:notes Module
      runner: ubuntu-latest
      lint_cmd: "spotlessCheck"
      lint_label: "spotlessCheck"
      detekt_cmd: ":feature:notes:detekt"
      detekt_label: ":feature:notes:detekt"
      test_cmd: ":feature:notes:allTests"
      test_label: ":feature:notes:allTests"
      assemble_cmd: ":feature:notes:assemble"
      assemble_label: ":feature:notes:assemble"
      kover_cmd: ":feature:notes:koverHtmlReport"
      kover_label: ":feature:notes:koverHtmlReport"
      kover_html_report_dir: feature/notes/build/reports/kover/html
      coverage_module: feature:notes
      coverage_title: feature:notes Line Coverage
    secrets: inherit
