name: quality-core-ui

on:
  pull_request:
    branches:
      - main
    paths:
      - "core/ui/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-core-ui.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "core/ui/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-core-ui.yml"
  workflow_dispatch:

concurrency:
  group: quality-core-ui-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    uses: ./.github/workflows/quality-module-reusable.yml
    with:
      module_key: core-ui
      module_title: core:ui Module
      runner: ubuntu-latest
      lint_cmd: ":core:ui:lintDebug"
      lint_label: ":core:ui:lintDebug"
      test_cmd: ":core:ui:allTests"
      test_label: ":core:ui:allTests"
      assemble_cmd: ":core:ui:assemble"
      assemble_label: ":core:ui:assemble"
      kover_cmd: ":core:ui:koverXmlReport"
      kover_label: ":core:ui:koverXmlReport"
      kover_report_path: core/ui/build/reports/kover/report.xml
      coverage_module: core:ui
      coverage_title: core:ui Line Coverage
    secrets: inherit
