name: quality-gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g

jobs:
  quality-linux:
    name: Linux (style/lint/test/build/coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run quality gates
        run: >
          ./gradlew
          spotlessCheck
          :androidApp:lintDebug
          test
          :androidApp:assembleDebug
          :desktopApp:assemble
          koverXmlReport

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-quality-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore

  quality-ios:
    name: macOS (iOS simulator build)
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build iOS simulator app
        run: ./gradlew :iosApp:buildIosSimulatorApp

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-quality-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore
