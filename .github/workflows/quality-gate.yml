name: quality-gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g

jobs:
  quality-linux:
    name: Linux (style/lint/test/build/coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      spotless: ${{ steps.collect-results.outputs.spotless }}
      lint: ${{ steps.collect-results.outputs.lint }}
      test: ${{ steps.collect-results.outputs.test }}
      assemble_android: ${{ steps.collect-results.outputs.assemble_android }}
      assemble_desktop: ${{ steps.collect-results.outputs.assemble_desktop }}
      kover: ${{ steps.collect-results.outputs.kover }}
      kover_table: ${{ steps.collect-results.outputs.kover_table }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run spotless
        id: spotless
        continue-on-error: true
        run: ./gradlew spotlessCheck

      - name: Run Android lint
        id: lint
        continue-on-error: true
        run: ./gradlew :androidApp:lintDebug

      - name: Run tests
        id: test
        continue-on-error: true
        run: ./gradlew test

      - name: Assemble Android debug
        id: assemble-android
        continue-on-error: true
        run: ./gradlew :androidApp:assembleDebug

      - name: Assemble Desktop
        id: assemble-desktop
        continue-on-error: true
        run: ./gradlew :desktopApp:assemble

      - name: Generate Kover XML
        id: kover
        continue-on-error: true
        run: ./gradlew koverXmlReport

      - name: Publish quality summary
        if: always()
        run: |
          status_icon() {
            case "$1" in
              success) echo "✅ success" ;;
              failure) echo "❌ failure" ;;
              cancelled) echo "⚪ cancelled" ;;
              skipped) echo "⚪ skipped" ;;
              *) echo "⚪ unknown" ;;
            esac
          }

          echo "### Quality Gate Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`spotlessCheck\` | $(status_icon "${SPOTLESS_RESULT}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`:androidApp:lintDebug\` | $(status_icon "${LINT_RESULT}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`test\` | $(status_icon "${TEST_RESULT}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`:androidApp:assembleDebug\` | $(status_icon "${ASSEMBLE_ANDROID_RESULT}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`:desktopApp:assemble\` | $(status_icon "${ASSEMBLE_DESKTOP_RESULT}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`koverXmlReport\` | $(status_icon "${KOVER_RESULT}") |" >> "$GITHUB_STEP_SUMMARY"
        env:
          SPOTLESS_RESULT: ${{ steps.spotless.outcome }}
          LINT_RESULT: ${{ steps.lint.outcome }}
          TEST_RESULT: ${{ steps.test.outcome }}
          ASSEMBLE_ANDROID_RESULT: ${{ steps.assemble-android.outcome }}
          ASSEMBLE_DESKTOP_RESULT: ${{ steps.assemble-desktop.outcome }}
          KOVER_RESULT: ${{ steps.kover.outcome }}

      - name: Upload Kover reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-reports
          path: |
            **/build/reports/kover/**
          if-no-files-found: warn

      - name: Publish Kover summary
        if: always()
        run: |
          echo "### Kover Line Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Module | Missed | Covered | Total | Line % |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---:|---:|---:|---:|" >> "$GITHUB_STEP_SUMMARY"

          reports=$(find . -path '*/build/reports/kover/report.xml' | sort)
          if [ -z "$reports" ]; then
            echo "| _none_ | 0 | 0 | 0 | n/a |" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          while IFS= read -r report; do
            [ -z "$report" ] && continue
            line=$(grep 'counter type=\"LINE\"' "$report" | tail -n 1 || true)
            missed=$(echo "$line" | sed -n 's/.*missed=\"\([0-9]\+\)\".*/\1/p')
            covered=$(echo "$line" | sed -n 's/.*covered=\"\([0-9]\+\)\".*/\1/p')
            missed=${missed:-0}
            covered=${covered:-0}
            total=$((missed + covered))
            if [ "$total" -eq 0 ]; then
              pct="n/a"
            else
              pct=$(awk -v c="$covered" -v t="$total" 'BEGIN { printf "%.2f%%", (100*c)/t }')
            fi
            module=$(echo "$report" | sed -E 's#^\./##; s#/build/reports/kover/report.xml$##')
            echo "| \`$module\` | $missed | $covered | $total | $pct |" >> "$GITHUB_STEP_SUMMARY"
          done <<< "$reports"

      - name: Collect result outputs
        id: collect-results
        if: always()
        run: |
          table_file="$RUNNER_TEMP/kover_table.md"
          echo "| Module | Missed | Covered | Total | Line % |" > "$table_file"
          echo "|---|---:|---:|---:|---:|" >> "$table_file"

          reports=$(find . -path '*/build/reports/kover/report.xml' | sort)
          if [ -z "$reports" ]; then
            echo "| _none_ | 0 | 0 | 0 | n/a |" >> "$table_file"
          else
            while IFS= read -r report; do
              [ -z "$report" ] && continue
              line=$(grep 'counter type=\"LINE\"' "$report" | tail -n 1 || true)
              missed=$(echo "$line" | sed -n 's/.*missed=\"\([0-9]\+\)\".*/\1/p')
              covered=$(echo "$line" | sed -n 's/.*covered=\"\([0-9]\+\)\".*/\1/p')
              missed=${missed:-0}
              covered=${covered:-0}
              total=$((missed + covered))
              if [ "$total" -eq 0 ]; then
                pct="n/a"
              else
                pct=$(awk -v c="$covered" -v t="$total" 'BEGIN { printf "%.2f%%", (100*c)/t }')
              fi
              module=$(echo "$report" | sed -E 's#^\./##; s#/build/reports/kover/report.xml$##')
              echo "| \`$module\` | $missed | $covered | $total | $pct |" >> "$table_file"
            done <<< "$reports"
          fi

          echo "spotless=${SPOTLESS_RESULT}" >> "$GITHUB_OUTPUT"
          echo "lint=${LINT_RESULT}" >> "$GITHUB_OUTPUT"
          echo "test=${TEST_RESULT}" >> "$GITHUB_OUTPUT"
          echo "assemble_android=${ASSEMBLE_ANDROID_RESULT}" >> "$GITHUB_OUTPUT"
          echo "assemble_desktop=${ASSEMBLE_DESKTOP_RESULT}" >> "$GITHUB_OUTPUT"
          echo "kover=${KOVER_RESULT}" >> "$GITHUB_OUTPUT"
          echo "kover_table<<EOF" >> "$GITHUB_OUTPUT"
          cat "$table_file" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          SPOTLESS_RESULT: ${{ steps.spotless.outcome }}
          LINT_RESULT: ${{ steps.lint.outcome }}
          TEST_RESULT: ${{ steps.test.outcome }}
          ASSEMBLE_ANDROID_RESULT: ${{ steps.assemble-android.outcome }}
          ASSEMBLE_DESKTOP_RESULT: ${{ steps.assemble-desktop.outcome }}
          KOVER_RESULT: ${{ steps.kover.outcome }}

      - name: Enforce quality gates
        if: always()
        run: |
          failed=0
          for result in "$SPOTLESS_RESULT" "$LINT_RESULT" "$TEST_RESULT" "$ASSEMBLE_ANDROID_RESULT" "$ASSEMBLE_DESKTOP_RESULT" "$KOVER_RESULT"; do
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "One or more quality gates failed."
            exit 1
          fi
        env:
          SPOTLESS_RESULT: ${{ steps.spotless.outcome }}
          LINT_RESULT: ${{ steps.lint.outcome }}
          TEST_RESULT: ${{ steps.test.outcome }}
          ASSEMBLE_ANDROID_RESULT: ${{ steps.assemble-android.outcome }}
          ASSEMBLE_DESKTOP_RESULT: ${{ steps.assemble-desktop.outcome }}
          KOVER_RESULT: ${{ steps.kover.outcome }}

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-quality-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore

  quality-ios:
    name: macOS (iOS simulator build)
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build iOS simulator app
        run: ./gradlew :iosApp:buildIosSimulatorApp

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-quality-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore

  report-pr:
    name: PR quality comment
    runs-on: ubuntu-latest
    needs:
      - quality-linux
      - quality-ios
    if: ${{ github.event_name == 'pull_request' && always() }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Post quality report comment
        uses: actions/github-script@v7
        env:
          LINUX_RESULT: ${{ needs.quality-linux.result }}
          IOS_RESULT: ${{ needs.quality-ios.result }}
          SPOTLESS_RESULT: ${{ needs.quality-linux.outputs.spotless }}
          LINT_RESULT: ${{ needs.quality-linux.outputs.lint }}
          TEST_RESULT: ${{ needs.quality-linux.outputs.test }}
          ASSEMBLE_ANDROID_RESULT: ${{ needs.quality-linux.outputs.assemble_android }}
          ASSEMBLE_DESKTOP_RESULT: ${{ needs.quality-linux.outputs.assemble_desktop }}
          KOVER_RESULT: ${{ needs.quality-linux.outputs.kover }}
          KOVER_TABLE: ${{ needs.quality-linux.outputs.kover_table }}
        with:
          script: |
            const marker = '<!-- quality-gate-report -->'
            const toBadge = (value) => {
              switch (value) {
                case 'success':
                  return '✅ success'
                case 'failure':
                  return '❌ failure'
                case 'cancelled':
                  return '⚪ cancelled'
                case 'skipped':
                  return '⚪ skipped'
                default:
                  return '⚪ unknown'
              }
            }

            const coverageTable = process.env.KOVER_TABLE?.trim()
              || '| Module | Missed | Covered | Total | Line % |\\n|---|---:|---:|---:|---:|\\n| _none_ | 0 | 0 | 0 | n/a |'

            const body = `${marker}
            ### Quality Gate Report

            | Check | Result |
            |---|---|
            | Linux overall | ${toBadge(process.env.LINUX_RESULT)} |
            | iOS overall | ${toBadge(process.env.IOS_RESULT)} |
            | \`spotlessCheck\` | ${toBadge(process.env.SPOTLESS_RESULT)} |
            | \`:androidApp:lintDebug\` | ${toBadge(process.env.LINT_RESULT)} |
            | \`test\` | ${toBadge(process.env.TEST_RESULT)} |
            | \`:androidApp:assembleDebug\` | ${toBadge(process.env.ASSEMBLE_ANDROID_RESULT)} |
            | \`:desktopApp:assemble\` | ${toBadge(process.env.ASSEMBLE_DESKTOP_RESULT)} |
            | \`koverXmlReport\` | ${toBadge(process.env.KOVER_RESULT)} |

            ### Kover Line Coverage
            ${coverageTable}
            `

            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            })
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              })
            }
