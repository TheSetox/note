name: quality-android

on:
  pull_request:
    branches:
      - main
    paths:
      - "androidApp/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-android.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "androidApp/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/quality-module-reusable.yml"
      - ".github/scripts/upsert-quality-comment.cjs"
      - ".github/workflows/quality-android.yml"
  workflow_dispatch:

concurrency:
  group: quality-android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    uses: ./.github/workflows/quality-module-reusable.yml
    with:
      module_key: android
      module_title: Android Module
      runner: ubuntu-latest
      lint_cmd: ":androidApp:lintDebug"
      lint_label: ":androidApp:lintDebug"
      test_cmd: ":androidApp:testDebugUnitTest"
      test_label: ":androidApp:testDebugUnitTest"
      assemble_cmd: ":androidApp:assembleDebug"
      assemble_label: ":androidApp:assembleDebug"
      kover_cmd: ":androidApp:koverXmlReport"
      kover_label: ":androidApp:koverXmlReport"
      kover_report_path: androidApp/build/reports/kover/report.xml
      coverage_module: androidApp
      coverage_title: Android Line Coverage
    secrets: inherit
